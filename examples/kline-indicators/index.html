		<script>
			function parsePrices(text) {
				return text.split(/[\s,пјҢ]+/).map((item) => Number(item.trim())).filter((value) => Number.isFinite(value) && value > 0);
			}
			function fmt(value, digits = 2) {
				return Number.isFinite(value) ? value.toFixed(digits) : "-";
			}
			function sma(values, period) {
				return values.map((_, index) => {
					if (index + 1 < period) return NaN;
					const slice = values.slice(index + 1 - period, index + 1);
					return slice.reduce((sum, value) => sum + value, 0) / period;
				});
			}
			function ema(values, period) {
				const alpha = 2 / (period + 1);
				const output = [];
				values.forEach((value, index) => {
					output.push(index === 0 ? value : value * alpha + output[index - 1] * (1 - alpha));
				});
				return output;
			}
			function rsi(values, period) {
				return values.map((_, index) => {
					if (index < period) return NaN;
					let gains = 0;
					let losses = 0;
					for (let i = index - period + 1; i <= index; i += 1) {
						const change = values[i] - values[i - 1];
						if (change >= 0) gains += change;
						else losses += Math.abs(change);
					}
					const avgGain = gains / period;
					const avgLoss = losses / period;
					if (avgLoss === 0) return 100;
					const rs = avgGain / avgLoss;
					return 100 - 100 / (1 + rs);
				});
			}
			function compute(values) {
				const sma5 = sma(values, 5);
				const ema5 = ema(values, 5);
				const ema10 = ema(values, 10);
				const dif = values.map((_, index) => ema5[index] - ema10[index]);
				const dea = ema(dif, 4);
				const hist = dif.map((value, index) => value - dea[index]);
				const rsi6 = rsi(values, 6);
				return values.map((close, index) => ({ index: index + 1, close, sma5: sma5[index], ema5: ema5[index], ema10: ema10[index], dif: dif[index], dea: dea[index], hist: hist[index], rsi6: rsi6[index] }));
			}
			function scalePoints(rows, key, width, height, pad, minValue, maxValue) {
				const xStep = rows.length > 1 ? (width - pad * 2) / (rows.length - 1) : 0;
				return rows.map((row, index) => {
					const value = row[key];
					if (!Number.isFinite(value)) return null;
					const x = pad + index * xStep;
					const y = pad + (maxValue - value) / (maxValue - minValue || 1) * (height - pad * 2);
					return `${x.toFixed(1)},${y.toFixed(1)}`;
				}).filter(Boolean).join(" ");
			}
			function drawChart(rows) {
				const svg = document.querySelector("#priceChart");
				const width = 900;
				const height = 260;
				const pad = 24;
				const values = rows.flatMap((row) => [row.close, row.sma5, row.ema5]).filter(Number.isFinite);
				const minValue = Math.min(...values);
				const maxValue = Math.max(...values);
				const priceLine = scalePoints(rows, "close", width, height, pad, minValue, maxValue);
				const smaLine = scalePoints(rows, "sma5", width, height, pad, minValue, maxValue);
				const emaLine = scalePoints(rows, "ema5", width, height, pad, minValue, maxValue);
				svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
				svg.innerHTML = `
					<rect x="0" y="0" width="${width}" height="${height}" fill="transparent"></rect>
					<line x1="${pad}" y1="${height - pad}" x2="${width - pad}" y2="${height - pad}" stroke="currentColor" opacity="0.18"></line>
					<line x1="${pad}" y1="${pad}" x2="${pad}" y2="${height - pad}" stroke="currentColor" opacity="0.18"></line>
					<polyline points="${priceLine}" fill="none" stroke="#0f766e" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"></polyline>
					<polyline points="${smaLine}" fill="none" stroke="#2563eb" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"></polyline>
					<polyline points="${emaLine}" fill="none" stroke="#b45309" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"></polyline>
					<text x="${pad}" y="18" fill="currentColor" opacity="0.68" font-size="12">max ${fmt(maxValue)}</text>
					<text x="${pad}" y="${height - 6}" fill="currentColor" opacity="0.68" font-size="12">min ${fmt(minValue)}</text>
				`;
			}
			function renderMetrics(rows) {
				const last = rows[rows.length - 1];
				const previous = rows[rows.length - 2] || last;
				const trend = last.close > last.sma5 ? "д»·ж јең?SMA5 дёҠж–№" : "д»·ж јең?SMA5 дёӢж–№";
				const macd = last.hist > 0 ? "зҹӯжңҹеҠЁйҮҸеҒҸејә" : "зҹӯжңҹеҠЁйҮҸеҒҸејұ";
				const rsiText = last.rsi6 > 70 ? "RSI еҒҸзғӯ" : last.rsi6 < 30 ? "RSI еҒҸеҶ·" : "RSI дёӯжҖ?;
				const slope = last.ema5 > previous.ema5 ? "EMA5 дёҠиЎҢ" : "EMA5 дёӢиЎҢ";
				const items = [
					["и¶ӢеҠҝдҪҚзҪ®", trend, "ж”¶зӣҳд»·дёҺзҹӯжңҹеқҮзәҝжҜ”иҫғгҖ?],
					["EMA ж–ңзҺҮ", slope, "зҹӯжңҹеҠ жқғе№іеқҮжҳҜеҗҰжҠ¬еҚҮгҖ?],
					["MACD жҹ?, `${fmt(last.hist, 3)} В· ${macd}`, "DIF дё?DEA зҡ„е·®гҖ?],
					["RSI6", `${fmt(last.rsi6, 1)} В· ${rsiText}`, "жңҖиҝ‘дёҠж¶?дёӢи·Ңе№…еәҰжҜ”иҫғгҖ?],
				];
				document.querySelector("#metricGrid").innerHTML = items.map(([name, value, desc]) => `<section class="metric-card"><span>${name}</span><strong>${value}</strong><span>${desc}</span></section>`).join("");
			}
			function renderTable(rows) {
				document.querySelector("#dataRows").innerHTML = rows.map((row) => `<tr><td>${row.index}</td><td>${fmt(row.close)}</td><td>${fmt(row.sma5)}</td><td>${fmt(row.ema5)}</td><td>${fmt(row.ema10)}</td><td>${fmt(row.dif, 3)}</td><td>${fmt(row.dea, 3)}</td><td>${fmt(row.hist, 3)}</td><td>${fmt(row.rsi6, 1)}</td></tr>`).join("");
			}
			function run() {
				const prices = parsePrices(document.querySelector("#priceInput").value);
				if (prices.length < 10) {
					document.querySelector("#metricGrid").innerHTML = '<section class="metric-card"><span>ж•°жҚ®дёҚи¶і</span><strong class="warn-text">иҮіе°‘иҫ“е…Ҙ 10 дёӘд»·ж ?/strong><span>MACD е’?RSI йңҖиҰҒи¶іеӨҹж ·жң¬гҖ?/span></section>';
					document.querySelector("#dataRows").innerHTML = "";
					document.querySelector("#priceChart").innerHTML = "";
					return;
				}
				const rows = compute(prices);
				drawChart(rows);
				renderMetrics(rows);
				renderTable(rows);
			}
			document.querySelector("#runButton").addEventListener("click", run);
			document.querySelectorAll(".sample-button").forEach((button) => {
				button.addEventListener("click", () => {
					document.querySelector("#priceInput").value = button.dataset.prices;
					run();
				});
			});
			run();
		</script>
